<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="10"/>

  <!-- Animated grid lines (vertical) -->
  <g opacity="0.08">
    <line x1="100" y1="0" x2="100" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="900" y2="50" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Sweeping light line -->
  <rect width="900" height="2" y="99" fill="url(#lineGrad)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-80;0,80;0,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Ghost pixel blocks (animated) -->
  <g opacity="0.15">
    <rect x="30" y="30" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="42" y="30" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="42" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="54" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.7s" begin="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="42" y="54" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="850" y="130" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="1.9s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="862" y="142" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="850" y="154" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.0s" begin="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="862" y="130" width="6" height="6" fill="white">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.3s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Main title: GHOST ALGORITHM -->
  <text
    x="450" y="90"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="10"
    filter="url(#glow)"
    opacity="0"
  >
    GHOST ALGORITHM
    <animate attributeName="opacity" values="0;1" dur="1.5s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text
    x="450" y="125"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#888888"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0"
  >
    STEGANOGRAPHY-BASED IMAGE GENERATION
    <animate attributeName="opacity" values="0;1" dur="1.5s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Divider line -->
  <line x1="200" y1="140" x2="700" y2="140" stroke="#333333" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="1.3s" fill="freeze"/>
  </line>

  <!-- Tagline -->
  <text
    x="450" y="163"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#555555"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0"
  >
    [ ENCRYPT · CONCEAL · TRANSMIT ]
    <animate attributeName="opacity" values="0;0.8" dur="1s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="680" y="152" width="8" height="14" fill="#444444" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0" dur="1.2s" begin="2s" repeatCount="indefinite"/>
  </rect>

</svg>
